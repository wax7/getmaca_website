server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name getmaca.de www.getmaca.de;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers (SSL wird vom NPM übernommen)
    add_header X-Frame-Options            "SAMEORIGIN"                 always;
    add_header X-Content-Type-Options     "nosniff"                    always;
    add_header X-XSS-Protection           "1; mode=block"              always;
    add_header Referrer-Policy            "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Health Check (Docker HEALTHCHECK) ─────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── SEO-Critical Files (korrekte Content-Types, kein Cache) ──
    location = /sitemap.xml {
        add_header Content-Type "application/xml; charset=UTF-8";
        add_header Cache-Control "public, max-age=3600";
    }

    location = /robots.txt {
        add_header Content-Type "text/plain; charset=UTF-8";
        add_header Cache-Control "public, max-age=3600";
    }

    location = /manifest.json {
        add_header Content-Type "application/manifest+json; charset=UTF-8";
        add_header Cache-Control "public, max-age=86400";
    }

    location = /favicon.ico {
        add_header Cache-Control "public, max-age=2592000";
    }

    location = /apple-touch-icon.png {
        add_header Cache-Control "public, max-age=2592000";
    }

    location = /og-image.png {
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Statische Assets mit langem Cache ─────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA Routing ───────────────────────────────────────────
    # React-Router: robuste Fallback-Reihenfolge für alte/neue Build-Struktur
    location / {
        try_files $uri $uri/index.html /index.html /client/index.html =404;
    }

    # ── index.html: kein Cache (damit Deploys sofort sichtbar) ──
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /client/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Deny dot-Files (.env, .git, …) ───────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Error Pages ───────────────────────────────────────────
    error_page 404              /index.html;
    error_page 500 502 503 504  /index.html;
}
