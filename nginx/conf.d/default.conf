server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name getmaca.de www.getmaca.de;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers (server-level: gelten für alle locations,
    # die NICHT selbst add_header verwenden — bei locations mit eigenem
    # add_header wird `include conf.d/security-headers.inc;` benutzt).
    include /etc/nginx/conf.d/security-headers.inc;

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Health Check (Docker HEALTHCHECK) ─────────────────────
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # ── Root-Redirect: 301 zur erkannten Sprache ──────────────
    # Bots ohne Accept-Language → /en (DEFAULT_LANGUAGE).
    # Echte Browser bekommen ihre Lieblingssprache (siehe map in nginx.conf).
    # 301 (statt 302) signalisiert Suchmaschinen die kanonische Zielsprache.
    location = / {
        return 301 /$preferred_lang;
    }

    # ── Sprachlose Seiten-Pfade: 301 zur erkannten Sprache ────
    # Die MACA-App verlinkt /terms und /privacy OHNE Sprach-Präfix
    # (Paywall-Pflichtlinks, Apple Review Guideline 3.1.2). Diese Seiten
    # existieren nur unter /<lang>/… — ohne Redirect liefern sie 404,
    # was Apple als "non-functional link" bei Subscription-Reviews ablehnt.
    #
    # WICHTIG: benannte Capture-Group ($legal_page), NICHT $1 verwenden.
    # $preferred_lang (map in nginx.conf) wird lazy ausgewertet – sobald es
    # unten referenziert wird, laufen dessen eigene Regexes (~*^de, ~*^fr, …)
    # und ein Treffer dort überschreibt $1, weil beide sich dieselben
    # nummerierten Capture-Register teilen. Ergebnis wäre z.B. /de/ statt
    # /de/privacy für jeden Nicht-Default-Browser. Named Capture umgeht das.
    location ~ ^/(?<legal_page>terms|privacy|imprint|faq|guide|troubleshooting)/?$ {
        return 301 /$preferred_lang/$legal_page;
    }

    # ── SEO-Critical Files (korrekte Content-Types, kein Cache) ──
    location = /sitemap.xml {
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Content-Type "application/xml; charset=UTF-8" always;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /robots.txt {
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Content-Type "text/plain; charset=UTF-8" always;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /manifest.json {
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Content-Type "application/manifest+json; charset=UTF-8" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /favicon.ico {
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location = /apple-touch-icon.png {
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location = /og-image.png {
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # ── Statische Assets mit langem Cache (immutable hash-suffixed files) ──
    location /assets/ {
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ── HTML-Dateien: niemals cachen ─────────────────────
    location ~ \.html$ {
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ── Directory-URLs (/en/, /de/faq/) und Pfade ohne Extension ──
    # try_files: exakt → directory-index → 404 (kein Soft-404 Fallback!)
    location ~ ^/[^.]*$ {
        include /etc/nginx/conf.d/security-headers.inc;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri $uri/index.html =404;
    }

    # ── Fallback für Pfade mit Punkt (.json, .txt, …) ──
    location / {
        include /etc/nginx/conf.d/security-headers.inc;
        try_files $uri $uri/index.html =404;
    }

    # ── Deny dot-Files (.env, .git, …) ───────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Error Pages: echtes 404 mit prerenderter Vike-Error-Page ──
    error_page 404              /_error/index.html;
    error_page 500 502 503 504  /_error/index.html;
    location = /_error/index.html {
        internal;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
