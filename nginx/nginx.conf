user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log Format – $remote_addr ist die echte Besucher-IP (dank real_ip).
    # Fail2ban kann damit direkt arbeiten.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # GZIP
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        application/rss+xml
        font/ttf
        font/otf
        image/svg+xml;

    # ── Real-IP (ngx_http_realip_module) ──────────────────────
    # Nginx ersetzt $remote_addr durch die echte Besucher-IP aus dem
    # X-Forwarded-For Header, sofern die Anfrage von einer trusted IP kommt.
    # → In den Logs steht die echte IP → Fail2ban sperrt nicht den Proxy.
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ── Accept-Language → Default-Sprachpfad ──────────────────
    # Wertet den ersten Sprach-Tag des Accept-Language Headers aus
    # und liefert den passenden Sprach-Slug. Fallback = "en".
    map $http_accept_language $preferred_lang {
        default                 "en";
        ~*^de                   "de";
        ~*^fr                   "fr";
        ~*^es                   "es";
        ~*^it                   "it";
        ~*^ja                   "ja";
        ~*^zh-Hant              "zh-Hant";
        ~*^zh-TW                "zh-Hant";
        ~*^zh-HK                "zh-Hant";
        ~*^zh                   "zh-Hans";
        ~*^ar                   "ar";
        ~*^ru                   "ru";
        ~*^nl                   "nl";
        ~*^tr                   "tr";
        ~*^sv                   "sv";
        ~*^da                   "da";
        ~*^ko                   "ko";
        ~*^nb                   "nb";
        ~*^no                   "nb";
        ~*^nn                   "nb";
    }

    include /etc/nginx/conf.d/*.conf;
}
