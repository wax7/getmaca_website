name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pages/**'
      - 'src/public/**'
      - 'scripts/**'
      - 'nginx/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.node.json'
      - 'vite.config.ts'
      - 'index.html'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # manueller Trigger

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Prepare SEO artifacts
        run: |
          bash scripts/prepare_seo_artifacts.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: |
            ${{ env.REGISTRY }}/wax7/getmaca
            ${{ env.REGISTRY }}/wax7/getmaca_website
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # ── IndexNow: Bing/Yandex über Update informieren ──────────
      - name: Submit URLs via IndexNow
        if: success()
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "getmaca.de",
              "key": "13417c4c8b4345269593617ce3fc3b14",
              "keyLocation": "https://getmaca.de/13417c4c8b4345269593617ce3fc3b14.txt",
              "urlList": [
                "https://getmaca.de/en",
                "https://getmaca.de/de",
                "https://getmaca.de/fr",
                "https://getmaca.de/es",
                "https://getmaca.de/it",
                "https://getmaca.de/pt",
                "https://getmaca.de/ja",
                "https://getmaca.de/zh",
                "https://getmaca.de/en/faq",
                "https://getmaca.de/de/faq"
              ]
            }' || true
          echo "IndexNow submission completed"
