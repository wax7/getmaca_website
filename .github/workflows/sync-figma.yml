name: Sync Figma Files from Testweb

on:
  # Manuell auslösbar in GitHub Actions UI
  workflow_dispatch:

  # Taeglich um 9:00 Uhr (Europe/Berlin = UTC+1, also 8:00 UTC)
  schedule:
    - cron: '0 8 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout getmaca_website (Produktion)
        uses: actions/checkout@v4
        with:
          path: production
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Testweb (Figma Source, public)
        uses: actions/checkout@v4
        with:
          repository: wax7/Testweb
          path: figma

      - name: Check for Figma changes
        id: check
        run: |
          # Letzten synced Commit merken (falls Datei existiert)
          LAST_SYNC=""
          if [ -f production/.figma-last-sync ]; then
            LAST_SYNC=$(cat production/.figma-last-sync)
          fi

          # Aktuellen Figma Commit holen
          CURRENT=$(cd figma && git rev-parse HEAD)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          if [ "$LAST_SYNC" = "$CURRENT" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Keine neuen Figma-Aenderungen (letzter Sync: $CURRENT)"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Neue Figma-Aenderungen gefunden! Sync von $LAST_SYNC zu $CURRENT"
          fi

      - name: Sync Figma files
        if: steps.check.outputs.changed == 'true'
        run: |
          set -e
          cd production

          echo "Synce Figma-Dateien..."

          # 1) src/ komplett uebernehmen, ABER src/public/ bewahren
          if [ -d ../figma/src ]; then
            # public/ sichern bevor src/ geloescht wird
            if [ -d src/public ]; then
              cp -r src/public /tmp/maca-public-backup
            fi

            rm -rf src/
            cp -r ../figma/src/ src/

            # public/ wiederherstellen (sitemap.xml, robots.txt, og-image.png)
            if [ -d /tmp/maca-public-backup ]; then
              rm -rf src/public
              cp -r /tmp/maca-public-backup src/public
              rm -rf /tmp/maca-public-backup
            fi
            echo "src/ synced (public/ bewahrt)"
          fi

          # ── 2) index.html: Figma-Aenderungen uebernehmen, SEO-Head bewahren ──
          # NICHT blind kopieren – unser index.html hat umfangreiche statische
          # SEO-Tags (OG, Twitter, JSON-LD, hreflang) die Crawler ohne JS sehen.
          # Figma aendert nur <div id="root"> und <script>, die sich nicht aendern.
          # Daher: index.html wird NICHT ueberschrieben.
          echo "index.html NICHT ueberschrieben (SEO-geschuetzt)"

          # ── 3) public/ Ordner NICHT anfassen ──
          # public/ enthaelt Produktions-Dateien wie sitemap.xml, robots.txt
          # Diese werden von Figma Sync nicht beruehrt!

          # ── 4) package.json: Figma-Dependencies übernehmen, ──
          #        aber unsere Scripts + devDependencies behalten
          if [ -f ../figma/package.json ]; then
            # Installiere jq für JSON-Merge
            sudo apt-get -qq install -y jq > /dev/null 2>&1

            # Figma-Dependencies extrahieren
            FIGMA_DEPS=$(jq '.dependencies // {}' ../figma/package.json)

            # In unser package.json mergen (überschreibt nur dependencies)
            jq --argjson deps "$FIGMA_DEPS" '.dependencies = $deps' package.json > package.json.tmp
            mv package.json.tmp package.json
          fi

          # ── 5) vite.config.ts übernehmen, aber outDir + publicDir sichern ──
          if [ -f ../figma/vite.config.ts ]; then
            cp ../figma/vite.config.ts vite.config.ts

            # Sicherstellen dass outDir: 'build' gesetzt ist
            if grep -q "outDir:" vite.config.ts; then
              # outDir bereits vorhanden → auf 'build' setzen
              sed -i "s/outDir:.*$/outDir: 'build',/" vite.config.ts
            else
              # outDir fehlt → nach 'build: {' einfügen
              sed -i "/build: {/a\\      target: 'esnext',\n      outDir: 'build'," vite.config.ts
            fi

            # publicDir MUSS als Top-Level-Option gesetzt sein (nicht in build:!)
            # Entferne eventuelle falsche publicDir in build: Block
            sed -i "/build:/,/},/ { /publicDir:/d }" vite.config.ts

            # Setze publicDir als Top-Level-Option vor build:
            if ! grep -q "publicDir:" vite.config.ts; then
              sed -i "/build: {/i\\    publicDir: 'src/public'," vite.config.ts
            else
              sed -i "s|publicDir:.*$|publicDir: 'src/public',|" vite.config.ts
            fi
          fi

          # ── 6) Letzten Sync-Commit merken ──
          echo "${{ steps.check.outputs.current }}" > .figma-last-sync

          echo "Sync abgeschlossen!"

      - name: Regenerate sitemap.xml from current translations
        if: steps.check.outputs.changed == 'true'
        run: |
          cd production
          
          echo "Regeneriere sitemap.xml basierend auf aktuellen Sprachen..."
          
          # Extrahiere Sprachcodes aus translations.ts (nach: export const translations...)
          LANGS=$(grep -oP "^\s+['\"]?\K[a-z-]+" src/locales/translations.ts | \
            grep -E "^[a-z]{2}(-[A-Z][a-z]+)?$" | sort -u)
          
          echo "Gefundene Sprachen: $(echo $LANGS | tr '\n' ' ')"
          
          # Generiere neue sitemap.xml
          LASTMOD=$(date +%Y-%m-%d)
          BASE_URL="https://getmaca.de"
          
          cat > src/public/sitemap.xml << 'SITEMAP_EOF'
<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"
        xmlns:xhtml="http://www.w3.org/1999/xhtml">
SITEMAP_EOF
          
          PAGES="/ /guide /faq /imprint /privacy /terms /troubleshooting /history"
          
          for LANG in $LANGS; do
            for PAGE in $PAGES; do
              # Entferne führenden Slash falls vorhanden
              PAGE_PATH="${PAGE%/}"
              [ "$PAGE_PATH" = "" ] && PAGE_PATH="" || PAGE_PATH="$PAGE_PATH"
              
              # Priority: home=1.0, rest=0.7
              if [ "$PAGE_PATH" = "" ]; then
                PRIORITY="1.0"
              else
                PRIORITY="0.7"
              fi
              
              cat >> src/public/sitemap.xml << SITEMAP_EOF
  <url>
    <loc>$BASE_URL/$LANG$PAGE_PATH</loc>
    <lastmod>$LASTMOD</lastmod>
    <changefreq>weekly</changefreq>
    <priority>$PRIORITY</priority>
SITEMAP_EOF
              
              # xhtml:link für alle Sprachvarianten (hreflang)
              for ALT_LANG in $LANGS; do
                ALT_PATH="/$ALT_LANG$PAGE_PATH"
                echo "    <xhtml:link rel=\"alternate\" hreflang=\"$ALT_LANG\" href=\"$BASE_URL$ALT_PATH\"/>" >> src/public/sitemap.xml
              done
              
              # x-default nur für home
              if [ "$PAGE_PATH" = "" ]; then
                echo "    <xhtml:link rel=\"alternate\" hreflang=\"x-default\" href=\"$BASE_URL/en\"/>" >> src/public/sitemap.xml
              fi
              
              echo "  </url>" >> src/public/sitemap.xml
            done
          done
          
          cat >> src/public/sitemap.xml << 'SITEMAP_EOF'
</urlset>
SITEMAP_EOF
          
          LANG_COUNT=$(echo "$LANGS" | wc -w)
          echo "✅ sitemap.xml regeneriert mit $LANG_COUNT Sprachen"

      - name: Validate Sitemap Languages
        if: steps.check.outputs.changed == 'true'
        run: |
          cd production
          
          echo "Validiere sitemap.xml Sprachen..."
          
          # Extrahiere Sprachcodes aus translations.ts
          CURRENT_LANGS=$(grep -oP "^\s+['\"]?\K[a-z-]+" src/locales/translations.ts | \
            grep -E "^[a-z]{2}(-[A-Z][a-z]+)?$" | sort -u)
          
          # Extrahiere Sprachcodes aus sitemap.xml
          SITEMAP_LANGS=$(grep -oP "$BASE_URL/\K[a-z-]+" src/public/sitemap.xml | sort -u)
          
          echo "Sprachen in translations.ts: $(echo $CURRENT_LANGS | tr '\n' ' ')"
          echo "Sprachen in sitemap.xml: $(echo $SITEMAP_LANGS | tr '\n' ' ')"
          
          # Vergleiche
          MISSING=$(comm -23 <(echo "$CURRENT_LANGS") <(echo "$SITEMAP_LANGS"))
          EXTRA=$(comm -13 <(echo "$CURRENT_LANGS") <(echo "$SITEMAP_LANGS"))
          
          if [ -n "$MISSING" ]; then
            echo "⚠️  FEHLEN in sitemap.xml: $MISSING"
          fi
          
          if [ -n "$EXTRA" ]; then
            echo "⚠️  ÜBERSCHUSS in sitemap.xml: $EXTRA"
          fi
          
          if [ -z "$MISSING" ] && [ -z "$EXTRA" ]; then
            echo "✅ Sitemap-Sprachen konsistent!"
          fi

      - name: Commit & Push
        if: steps.check.outputs.changed == 'true'
        run: |
          cd production
          git config user.name "Figma Sync Bot"
          git config user.email "figma-sync@getmaca.de"

          git add -A

          # Nur committen wenn es tatsächlich Änderungen gibt
          if git diff --staged --quiet; then
            echo "Keine Datei-Aenderungen nach Sync."
          else
            FIGMA_SHORT=$(echo "${{ steps.check.outputs.current }}" | cut -c1-7)
            git commit -m "feat: sync Figma design update (${FIGMA_SHORT})"
            git pull --rebase origin main
            git push
            echo "Figma-Update gepusht!"
          fi
