name: Sync Figma Files from Testweb

on:
  # Manuell auslösbar in GitHub Actions UI
  workflow_dispatch:

  # Taeglich um 9:00 Uhr (Europe/Berlin = UTC+1, also 8:00 UTC)
  schedule:
    - cron: '0 8 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout getmaca_website (Produktion)
        uses: actions/checkout@v6.0.2
        with:
          path: production
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Testweb (Figma Source, public)
        uses: actions/checkout@v6.0.2
        with:
          repository: wax7/Testweb
          path: figma

      - name: Check for Figma changes
        id: check
        run: |
          # Letzten synced Commit merken (falls Datei existiert)
          LAST_SYNC=""
          if [ -f production/.figma-last-sync ]; then
            LAST_SYNC=$(cat production/.figma-last-sync)
          fi

          # Aktuellen Figma Commit holen
          CURRENT=$(cd figma && git rev-parse HEAD)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          if [ "$LAST_SYNC" = "$CURRENT" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Keine neuen Figma-Aenderungen (letzter Sync: $CURRENT)"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Neue Figma-Aenderungen gefunden! Sync von $LAST_SYNC zu $CURRENT"
          fi

      - name: Sync Figma files
        if: steps.check.outputs.changed == 'true'
        run: |
          set -e
          cd production

          echo "Synce Figma-Dateien..."

          # 1) src/ komplett uebernehmen, ABER src/public/ bewahren
          if [ -d ../figma/src ]; then
            # public/ sichern bevor src/ geloescht wird
            if [ -d src/public ]; then
              cp -r src/public /tmp/maca-public-backup
            fi

            rm -rf src/
            cp -r ../figma/src/ src/

            # public/ wiederherstellen (sitemap.xml, robots.txt, og-image.png)
            if [ -d /tmp/maca-public-backup ]; then
              rm -rf src/public
              cp -r /tmp/maca-public-backup src/public
              rm -rf /tmp/maca-public-backup
            fi
            echo "src/ synced (public/ bewahrt)"
          fi

          # ── 2) index.html: Figma-Aenderungen uebernehmen, SEO-Head bewahren ──
          # NICHT blind kopieren – unser index.html hat umfangreiche statische
          # SEO-Tags (OG, Twitter, JSON-LD, hreflang) die Crawler ohne JS sehen.
          # Figma aendert nur <div id="root"> und <script>, die sich nicht aendern.
          # Daher: index.html wird NICHT ueberschrieben.
          echo "index.html NICHT ueberschrieben (SEO-geschuetzt)"

          # ── 3) public/ Ordner NICHT anfassen ──
          # public/ enthaelt Produktions-Dateien wie sitemap.xml, robots.txt
          # Diese werden von Figma Sync nicht beruehrt!

          # ── 4) package.json: Figma-Dependencies mergen, ──
          #        aber build-kritische Dependencies und Scripts bewahren
          if [ -f ../figma/package.json ]; then
            # Installiere jq für JSON-Merge
            sudo apt-get -qq install -y jq > /dev/null 2>&1

            # Figma-Dependencies extrahieren
            FIGMA_DEPS=$(jq '.dependencies // {}' ../figma/package.json)
            FIGMA_DEV_DEPS=$(jq '.devDependencies // {}' ../figma/package.json)

            # Build-kritische Pakete aus Production-Repo bewahren
            CORE_DEPS=$(jq '.dependencies | {
              vike,
              "vike-react",
              react,
              "react-dom",
              "react-router",
              motion
            } | with_entries(select(.value != null))' package.json)

            CORE_DEV_DEPS=$(jq '.devDependencies | {
              vite,
              "@types/node",
              "@vitejs/plugin-react",
              "@vitejs/plugin-react-swc",
              "@tailwindcss/vite",
              tailwindcss
            } | with_entries(select(.value != null))' package.json)

            # Merge-Strategie:
            # 1) bestehende Dependencies behalten
            # 2) Figma-Dependencies darüberlegen
            # 3) Core-Dependencies final erzwingen (dürfen nie fehlen)
            jq --argjson figma "$FIGMA_DEPS" \
              --argjson core "$CORE_DEPS" \
              --argjson figmaDev "$FIGMA_DEV_DEPS" \
              --argjson coreDev "$CORE_DEV_DEPS" \
              '.dependencies = ((.dependencies // {}) + $figma + $core)
              | .devDependencies = ((.devDependencies // {}) + $figmaDev + $coreDev)' \
              package.json > package.json.tmp
            mv package.json.tmp package.json

            # Lockfile nach dem Merge aktualisieren, damit Docker bevorzugt npm ci nutzen kann.
            npm install --package-lock-only --legacy-peer-deps > /dev/null 2>&1
          fi

          # ── 5) vite.config.ts übernehmen, aber outDir + publicDir sichern ──
          if [ -f ../figma/vite.config.ts ]; then
            cp ../figma/vite.config.ts vite.config.ts

            # Sicherstellen dass outDir: 'build' gesetzt ist
            if grep -q "outDir:" vite.config.ts; then
              # outDir bereits vorhanden → auf 'build' setzen
              sed -i "s/outDir:.*$/outDir: 'build',/" vite.config.ts
            else
              # outDir fehlt → nach 'build: {' einfügen
              sed -i "/build: {/a\\      target: 'esnext',\n      outDir: 'build'," vite.config.ts
            fi

            # publicDir MUSS als Top-Level-Option gesetzt sein (nicht in build:!)
            # Entferne eventuelle falsche publicDir in build: Block
            sed -i "/build:/,/},/ { /publicDir:/d }" vite.config.ts

            # Setze publicDir als Top-Level-Option vor build:
            if ! grep -q "publicDir:" vite.config.ts; then
              sed -i "/build: {/i\\    publicDir: 'src/public'," vite.config.ts
            else
              sed -i "s|publicDir:.*$|publicDir: 'src/public',|" vite.config.ts
            fi
          fi

          # ── 6) Letzten Sync-Commit merken ──
          echo "${{ steps.check.outputs.current }}" > .figma-last-sync

          echo "Sync abgeschlossen!"

      - name: Prepare SEO artifacts
        if: steps.check.outputs.changed == 'true'
        run: |
          cd production
          bash scripts/prepare_seo_artifacts.sh

      - name: Commit & Push
        if: steps.check.outputs.changed == 'true'
        run: |
          cd production
          git config user.name "Figma Sync Bot"
          git config user.email "figma-sync@getmaca.de"

          git add -A

          # Nur committen wenn es tatsächlich Änderungen gibt
          if git diff --staged --quiet; then
            echo "Keine Datei-Aenderungen nach Sync."
          else
            FIGMA_SHORT=$(echo "${{ steps.check.outputs.current }}" | cut -c1-7)
            git commit -m "feat: sync Figma design update (${FIGMA_SHORT})"
            git pull --rebase origin main
            git push
            echo "Figma-Update gepusht!"
          fi
